<!DOCTYPE html>
<!--
  eo-bridge 메시지 에이전트 plugin (AGPL v3, 비주얼 없음)

  에디터 내부에서 자동 기동되어, 브릿지 페이지(window.parent.parent — 같은 origin 서빙)와
  MessageChannel 을 연결한다. 브릿지의 요청(insertPlaceholder/getActiveCell)을
  Office JS API callCommand 로 수행하고 결과를 되돌린다.

  프레임 구조: 임베더 → 브릿지(host.html) → 에디터 iframe(DS origin) → [이 plugin iframe]
-->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>eo-bridge agent</title>
  <script src="plugins.js"></script>
</head>
<body>
  <script>
    var port = null

    function getActiveCell(done) {
      window.Asc.plugin.callCommand(function () {
        var cell = Api.GetActiveSheet().GetActiveCell()
        return { address: cell.GetAddress(false, false), value: cell.GetValue() }
      }, false, false, function (result) {
        done(result || null)
      })
    }

    function handleRequest(msg) {
      if (msg.type === 'insertPlaceholder') {
        window.Asc.scope.name = String(msg.dataName || '')
        window.Asc.plugin.callCommand(function () {
          var cell = Api.GetActiveSheet().GetActiveCell()
          cell.SetValue('#{' + Asc.scope.name + '}')
        }, false, true, function () {
          getActiveCell(function (cell) {
            port.postMessage({
              id: msg.id, ok: !!cell,
              address: cell && cell.address, value: cell && cell.value,
            })
          })
        })
        return
      }
      if (msg.type === 'getActiveCell') {
        getActiveCell(function (cell) {
          port.postMessage({
            id: msg.id, ok: !!cell,
            address: cell && cell.address, value: cell && cell.value,
          })
        })
        return
      }
      port.postMessage({ id: msg.id, ok: false, error: 'unknown type: ' + msg.type })
    }

    window.Asc.plugin.init = function () {
      var channel = new MessageChannel()
      port = channel.port1
      port.onmessage = function (e) { handleRequest(e.data || {}) }
      // 브릿지 페이지는 이 plugin 과 같은 origin 에서 서빙된다
      window.parent.parent.postMessage(
        { type: 'eo-plugin:connect' },
        location.origin,
        [channel.port2],
      )

      // 선택 변경 push (에디터가 이벤트를 지원할 때만 — best effort)
      var debounce = null
      if (window.Asc.plugin.attachEditorEvent) {
        window.Asc.plugin.attachEditorEvent('onSelectionChanged', function () {
          clearTimeout(debounce)
          debounce = setTimeout(function () {
            getActiveCell(function (cell) {
              if (cell && port) {
                port.postMessage({ type: 'selectionChanged', address: cell.address, value: cell.value })
              }
            })
          }, 300)
        })
      }
    }

    window.Asc.plugin.button = function () {}
  </script>
</body>
</html>
